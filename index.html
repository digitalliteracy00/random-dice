
<h2 class="sr-only">랜덤 주사위 굴리기</h2>
<style>
.wrap{display:flex;flex-direction:column;align-items:center;padding:2rem 1rem;gap:1.5rem}
.controls{display:flex;gap:10px;align-items:center}
.clbl{font-size:14px;color:var(--color-text-secondary)}
.cbtn{border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);border-radius:var(--border-radius-md);padding:6px 16px;font-size:14px;cursor:pointer;color:var(--color-text-primary)}
.cbtn:hover{background:var(--color-background-secondary)}
.cbtn.on{background:var(--color-text-primary);color:var(--color-background-primary)}
.dice-row{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;min-height:120px;align-items:center}
.dice{width:110px;height:110px;border-radius:16px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;position:relative;transition:transform .1s}
.dice:active{transform:scale(.92)}
.dice.spin{animation:sp .4s ease}
@keyframes sp{0%{transform:rotate(0) scale(1)}30%{transform:rotate(-18deg) scale(.88)}65%{transform:rotate(10deg) scale(.95)}100%{transform:rotate(0) scale(1)}}
.dot{position:absolute;width:18px;height:18px;border-radius:50%;background:var(--color-text-primary)}
.total-row{display:flex;align-items:baseline;gap:10px}
.tlbl{font-size:14px;color:var(--color-text-secondary)}
.tval{font-size:36px;font-weight:500;color:var(--color-text-primary);min-width:50px;text-align:center}
.tval.pop{animation:pop .25s ease}
@keyframes pop{0%{transform:scale(.7);opacity:.3}100%{transform:scale(1);opacity:1}}
.rbtn{border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);border-radius:50px;padding:11px 36px;font-size:16px;font-weight:500;cursor:pointer;color:var(--color-text-primary);display:flex;align-items:center;gap:8px}
.rbtn:hover{background:var(--color-background-secondary)}
.rbtn:active{transform:scale(.97)}
.hist{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:400px}
.hp{background:var(--color-background-secondary);border-radius:50px;padding:3px 13px;font-size:13px;color:var(--color-text-secondary)}
.hp.new{color:var(--color-text-primary);font-weight:500}
</style>

<div class="wrap">
  <div class="controls">
    <span class="clbl">주사위 수</span>
    <button class="cbtn on" onclick="setN(1,this)">1개</button>
    <button class="cbtn" onclick="setN(2,this)">2개</button>
    <button class="cbtn" onclick="setN(3,this)">3개</button>
  </div>

  <div class="dice-row" id="diceRow"></div>

  <div class="total-row">
    <span class="tlbl">합계</span>
    <span class="tval" id="tval">-</span>
  </div>

  <button class="rbtn" onclick="rollAll()">
    <i class="ti ti-refresh" aria-hidden="true"></i> 굴리기
  </button>

  <div class="hist" id="hist"></div>
</div>

<script>
const POS = {
  1:[[50,50]],
  2:[[25,25],[75,75]],
  3:[[25,25],[50,50],[75,75]],
  4:[[25,25],[75,25],[25,75],[75,75]],
  5:[[25,25],[75,25],[50,50],[25,75],[75,75]],
  6:[[25,25],[75,25],[25,50],[75,50],[25,75],[75,75]]
};

let N=1, vals=[1], hist=[];

function setN(n,btn){
  N=n; vals=Array(n).fill(1);
  document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  build(); setTotal('-');
}

function build(){
  const row=document.getElementById('diceRow');
  row.innerHTML='';
  vals.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dice'; d.id='d'+i;
    d.title='클릭하면 이 주사위만 굴려요';
    d.onclick=()=>rollOne(i);
    drawDice(d, vals[i]);
    row.appendChild(d);
  });
}

function drawDice(el, v){
  el.innerHTML='';
  (POS[v]||[]).forEach(([x,y])=>{
    const dot=document.createElement('div');
    dot.className='dot';
    dot.style.left=(x-9)+'%';
    dot.style.top=(y-9)+'%';
    el.appendChild(dot);
  });
}

function rollOne(i){
  const el=document.getElementById('d'+i);
  el.classList.remove('spin'); void el.offsetWidth; el.classList.add('spin');
  let t=0;
  const iv=setInterval(()=>{
    vals[i]=Math.ceil(Math.random()*6);
    drawDice(el, vals[i]);
    if(++t>=10){ clearInterval(iv); el.classList.remove('spin'); refreshTotal(); }
  },45);
}

function rollAll(){
  for(let i=0;i<N;i++) rollOne(i);
  setTimeout(()=>{
    const s=vals.reduce((a,b)=>a+b,0);
    hist.unshift(s); if(hist.length>8) hist.pop();
    renderHist();
  },500);
}

function refreshTotal(){
  setTotal(vals.reduce((a,b)=>a+b,0));
}

function setTotal(v){
  const el=document.getElementById('tval');
  el.textContent=v;
  el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
}

function renderHist(){
  document.getElementById('hist').innerHTML=
    hist.map((v,i)=>`<span class="hp${i===0?' new':''}">${v}</span>`).join('');
}

build();
</script>
